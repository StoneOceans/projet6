name: CI-CD Projet 6

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  tests:
    name: Tests automatises
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installer les dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executer les tests
        run: |
          pytest -v --cov=app --cov-report=term-missing

  docker-build:
    name: Construire l image Docker
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construire l image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: projet6-scoring:latest

  deployment:
    name: Simulation du deploiement
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Valider le deploiement
        run: |
          echo "Tests valides"
          echo "Image Docker construite avec succes"
          echo "Deploiement simule avec succes"
