name: CI-CD Projet 6

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  tests:
    name: Tests automatises
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executer les tests
        run: |
          pytest -v --cov=app --cov-report=term-missing

  docker-build:
    name: Construire et tester l image Docker
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Construire l image Docker
        run: |
          docker build -t projet6-scoring .

      - name: Lancer le conteneur
        run: |
          docker run -d \
            --name projet6-api \
            -p 8000:8000 \
            projet6-scoring

      - name: Verifier la route health
        run: |
          for i in {1..20}; do
            if curl --fail http://localhost:8000/health; then
              echo "API Docker fonctionnelle"
              exit 0
            fi

            echo "Attente du demarrage de l API"
            sleep 3
          done

          docker logs projet6-api
          exit 1

      - name: Afficher les logs
        if: always()
        run: |
          docker logs projet6-api || true

      - name: Arreter le conteneur
        if: always()
        run: |
          docker stop projet6-api || true
          docker rm projet6-api || true

  deployment-simulation:
    name: Simulation du deploiement
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Valider le deploiement conteneurise
        run: |
          echo "Tests automatises valides"
          echo "Image Docker construite avec succes"
          echo "Conteneur Docker demarre avec succes"
          echo "Route health verifiee avec succes"
          echo "Deploiement simule valide"